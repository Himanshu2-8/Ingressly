services:
  db:
    image: postgres:latest
    ports:
      - "5432:5432"
    restart: always
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_DB: prpoxyServerDb
      POSTGRES_USER: user

  cache:
    image: redis:latest
    container_name: proxyServerRedis
    ports:
      - "6379:6379"
    restart: always
    # Optional: Persist data even if the container restarts
#    volumes:
#      - redis_data:/data
